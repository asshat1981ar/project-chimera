name: Chimera Android CI/CD

on:
  push:
    branches: [ "main", "develop", "claude/**" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint & Test

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-read-only: ${{ github.ref != 'refs/heads/main' }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run lint (core-model)
      run: ./gradlew :core-model:check

    - name: Run lint (core-database)
      run: ./gradlew :core-database:lint

    - name: Run lint (app)
      run: ./gradlew :app:lintMockDebug
      continue-on-error: true

    - name: Run unit tests
      run: ./gradlew testMockDebugUnitTest

    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          **/build/reports/tests/
        retention-days: 14

  build-debug:
    runs-on: ubuntu-latest
    needs: lint-and-test
    name: Build Debug APK

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleMockDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: chimera-debug-apk
        path: app/build/outputs/apk/mockDebug/*.apk
        retention-days: 30

  build-release:
    runs-on: ubuntu-latest
    needs: lint-and-test
    name: Build Release APK
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleProdRelease

    - name: Build Release AAB (Play Store)
      run: ./gradlew bundleProdRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: chimera-release-apk
        path: app/build/outputs/apk/prodRelease/*.apk
        retention-days: 90

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: chimera-release-aab
        path: app/build/outputs/bundle/prodRelease/*.aab
        retention-days: 90

  build-demo:
    runs-on: ubuntu-latest
    needs: lint-and-test
    name: Build Demo APK
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Demo APK
      run: ./gradlew assembleMockDemo

    - name: Upload Demo APK
      uses: actions/upload-artifact@v4
      with:
        name: chimera-demo-apk
        path: app/build/outputs/apk/mockDemo/*.apk
        retention-days: 30

  build-beta:
    runs-on: ubuntu-latest
    needs: lint-and-test
    name: Build Beta APK
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/') || github.ref == 'refs/heads/develop'

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Beta APK
      run: ./gradlew assembleProdBeta --no-daemon

    - name: Upload Beta APK
      uses: actions/upload-artifact@v4
      with:
        name: chimera-beta-apk
        path: app/build/outputs/apk/prod/beta/*.apk
        retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: build-release
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: chimera-release-apk
        path: release-artifacts/

    - name: Download Release AAB
      uses: actions/download-artifact@v4
      with:
        name: chimera-release-aab
        path: release-artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-artifacts/*
        generate_release_notes: true
        body: |
          Chimera: Ashes of the Hollow King - Beta Release

          Download the APK for direct install, or use the AAB for Play Store upload.
